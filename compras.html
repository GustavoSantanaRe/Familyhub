<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Compras - FamilyHub</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #f4f6fb;
}

.main-content {
  padding: 30px;
}

/* GRID */
.grid {
  display: flex;
  gap: 40px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 20px;
  padding: 25px;
  width: 300px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

/* ITEM */
.item {
  background: #f1f3f6;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.item input {
  width: 18px;
  height: 18px;
}

.completed {
  text-decoration: line-through;
  opacity: 0.6;
}

/* INPUT */
.add-area {
  display: flex;
  margin-top: 10px;
  gap: 10px;
}

.add-area input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.add-area button {
  border: none;
  background: #4CAF50;
  color: white;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body class="desktop-body">

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">🏠</div>
        <h2>FamilyHub</h2>
    </div>
    
    <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">🏠 Início</a>
        <a href="#" class="nav-item">📅 Agenda</a>
        <a href="compras.html" class="nav-item active">🛍️ Compras</a>
        <a href="financas.html" class="nav-item">💰 Finanças</a>
        <a href="#" class="nav-item">💬 Chat</a>

        <div class="spacer"></div>

        <a href="perfil.html" class="nav-item">👤 Meu Perfil</a>
        <a href="index.html" class="nav-item logout">🚪 Sair</a>
    </nav>
</aside>

<!-- CONTEÚDO -->
<main class="main-content">

<a href="dashboard.html">⬅ Voltar</a>

<h1 style="margin-bottom: 30px;">🛒 Listas & Compras</h1>

<div class="grid">

  <!-- LISTA 1 -->
  <div class="card">
    <h3>Compras do Mês (<span id="count1">0</span>)</h3>

    <div id="lista1"></div>

    <h4 style="margin: 15px 0 10px;">No carrinho</h4>
    <div id="concluidos1"></div>

    <button onclick="limparConcluidos('concluidos1')">
      Limpar concluídos
    </button>

    <div class="add-area">
      <input type="text" id="input1" placeholder="Adicionar item...">
      <button onclick="addItem('lista1','input1','concluidos1','count1')">+</button>
    </div>
  </div>

  <!-- LISTA 2 -->
  <div class="card">
    <h3>Feira & Hortifruti (<span id="count2">0</span>)</h3>

    <div id="lista2"></div>

    <h4 style="margin: 15px 0 10px;">No carrinho</h4>
    <div id="concluidos2"></div>

    <button onclick="limparConcluidos('concluidos2')">
      Limpar concluídos
    </button>

    <div class="add-area">
      <input type="text" id="input2" placeholder="Adicionar item...">
      <button onclick="addItem('lista2','input2','concluidos2','count2')">+</button>
    </div>
  </div>

  <!-- LISTA 3 -->
  <div class="card">
    <h3>Farmácia & Geral (<span id="count3">0</span>)</h3>

    <div id="lista3"></div>

    <h4 style="margin: 15px 0 10px;">No carrinho</h4>
    <div id="concluidos3"></div>

    <button onclick="limparConcluidos('concluidos3')">
      Limpar concluídos
    </button>

    <div class="add-area">
      <input type="text" id="input3" placeholder="Adicionar item...">
      <button onclick="addItem('lista3','input3','concluidos3','count3')">+</button>
    </div>
  </div>

</div>

</main>

<script>
function addItem(listaId, inputId, concluidosId, countId) {
  let input = document.getElementById(inputId);
  let valor = input.value.trim();

  if (!valor) return;

  let lista = document.getElementById(listaId);

  let div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <input type="checkbox" onchange="toggleItem(this, '${listaId}', '${concluidosId}', '${countId}')">
    <span>${valor}</span>
  `;

  lista.appendChild(div);
  input.value = "";

  atualizarContador(listaId, countId);
}

function toggleItem(checkbox, listaId, concluidosId, countId) {
  let item = checkbox.parentElement;

  if (checkbox.checked) {
    item.classList.add("completed");
    document.getElementById(concluidosId).appendChild(item);
  } else {
    item.classList.remove("completed");
    document.getElementById(listaId).appendChild(item);
  }

  atualizarContador(listaId, countId);
}

function limparConcluidos(concluidosId) {
  document.getElementById(concluidosId).innerHTML = "";
}

function atualizarContador(listaId, countId) {
  let total = document.getElementById(listaId).children.length;
  document.getElementById(countId).innerText = total;
}
</script>

</body>
</html>
