<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyHub - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">🏠</div>
            <h1>FamilyHub</h1>
            <p>Bem-vindo de volta à sua família</p>
        </div>

        <div class="avatar-group">
            <span class="avatar mae">MÃE</span>
            <span class="avatar pai">PAI</span>
            <span class="avatar ana">ANA</span>
            <span class="avatar plus">+2</span>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>E-mail</label>
                <!-- IMPORTANTE: id adicionado -->
                <input type="email" id="email" placeholder="familia@exemplo.com" required>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <div class="form-options">
                <label><input type="checkbox"> Lembrar de mim</label>
                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <div class="divider">ou continue com</div>

        <button class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
            Entrar com Google
        </button>

        <div class="login-footer">
            Não tem conta? <a href="#">Criar família &rarr;</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            let email = document.getElementById("email").value;

            // pega o nome antes do @
            let nome = email.split("@")[0];

            // deixa primeira letra maiúscula
            nome = nome.charAt(0).toUpperCase() + nome.slice(1);

            // salva no navegador
            localStorage.setItem("usuario", nome);

            // redireciona
            window.location.href = "dashboard.html";
        });
    </script>

</body>
</html>
